<!doctype html>
<html lang="pt-br">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato Responsivo | HTML e CSS</title>
    <meta name="description" content="Formulário de contato responsivo desenvolvido apenas com HTML5 e CSS3, com validação nativa e layout adaptável para diferentes dispositivos.">
    <meta name="keywords" content="formulário, HTML5, CSS3, responsivo, contato, frontend">
    <meta name="author" content="Matheus Fernando Ribeiro Martins">
    <meta name="theme-color" content="#333333">
    <meta property="og:title" content="Formulário Responsivo">
    <meta property="og:description" content="Projeto de formulário criado apenas com HTML e CSS.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/img/logo.jfif">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="img/logo.jfif" type="image/x-icon">

  </head>
  <body>
    <input type="checkbox" id="theme-toggle" hidden/>
    <div class="page">
      <header>
        <a href="https://www.unileste.edu.br" target="_blank" class="tooltip-header">

        <img src="img/logo.jfif" alt="Unileste">

        <span class="tooltip-text-header">
        Ir para o site da Unileste
        </span>

        </a>

        <h1>Formulário e Responsividade</h1>

        <label for="theme-toggle" class="theme-btn">
          <span class="icon sun">☀️</span>
          <span class="icon moon">🌙</span>
        </label>
      </header>
      <main>
        <form 
          action="mailto:matheus1030br@gmail.com?subject=Contato%20pelo%20Formulário%20-%20Sistemas%20Web"
          method="post"
          enctype="text/plain"
        >
          <label for="name">Nome completo:</label>
          <input
            type="text"
            id="name"
            name="Nome"
            required
            placeholder="Digite seu nome completo"
            minlength="2"
            pattern=".{2,}"
          />

          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="E-mail"
            required
            placeholder="Digite seu email"
          />

          <label for="assunto">Assunto</label>
          <select id="assunto" name="Assunto" required>
            <option value="">Selecione um assunto</option>
            <option value="duvida">Dúvida</option>
            <option value="suporte">Suporte</option>
            <option value="feedback">Feedback</option>
          </select>

          <label for="message">Mensagem:</label>
          <textarea
            id="message"
            name="Mensagem"
            required
            placeholder="Digite sua mensagem"
            maxlength="500"
          ></textarea>

          <div class="botoes">
            <button type="reset" class="limpar">Limpar</button>
            <button type="submit" class="enviar">Enviar</button>
          </div>
        </form>
        <section>
        <a href="https://github.com/Matheus-Fernando-br/Formulario-Atividade-Unileste"
          target="_blank"
          class="tooltip-social">
          <img src="img/github.png" alt="GitHub">
          <span class="tooltip-text-social">
          Ver projeto no GitHub
          </span>
        </a>

        <a href="https://www.linkedin.com/in/matheus-ribeiro-7b4a9822b/"
          target="_blank"
          class="tooltip-social">
          <img src="img/linkedin.avif" alt="LinkedIn">
          <span class="tooltip-text-social">
          Visitar LinkedIn
          </span>
        </a>
        </section>
      </main>
      <footer>
        <p>
          &copy; Matheus Fernando Ribeiro Martins & Letícia Rodrigues Pires
        </p>
      </footer>
    </div>
  </body>
</html>
